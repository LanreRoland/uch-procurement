<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <!-- ========== SHIELD / CREST MARK ========== -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006633"/>
      <stop offset="100%" stop-color="#003319"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C85A"/>
      <stop offset="100%" stop-color="#9A7B1A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M76 12 L140 12 L140 96 Q108 128 76 140 Q44 128 12 96 L12 12 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Shield inner border (gold) -->
  <path d="M76 20 L132 20 L132 92 Q108 118 76 130 Q44 118 20 92 L20 20 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Horizontal divider line -->
  <line x1="20" y1="58" x2="132" y2="58" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Torch flame (gold) -->
  <g transform="translate(76, 30)">
    <!-- Flame petals -->
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="#E8C85A" opacity="0.9"
             transform="rotate(-18 0 0)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="#C9A227" opacity="0.9"
             transform="rotate(18 0 0)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="10" fill="#FFD966"/>
    <!-- Torch body -->
    <rect x="-3" y="0" width="6" height="14" rx="2" fill="url(#goldGrad)"/>
    <!-- Torch base/handle knurls -->
    <rect x="-4" y="12" width="8" height="3" rx="1" fill="#9A7B1A"/>
    <rect x="-4" y="16" width="8" height="2" rx="1" fill="#C9A227"/>
  </g>

  <!-- Open book icon below divider -->
  <g transform="translate(76, 88)">
    <!-- Left page -->
    <path d="M-22 -14 Q-22 -18 -18 -18 L-2 -18 L-2 12 Q-10 10 -22 12 Z"
          fill="#FFFFFF" opacity="0.18"/>
    <!-- Right page -->
    <path d="M22 -14 Q22 -18 18 -18 L2 -18 L2 12 Q10 10 22 12 Z"
          fill="#FFFFFF" opacity="0.18"/>
    <!-- Spine line -->
    <line x1="0" y1="-18" x2="0" y2="12" stroke="#E8C85A" stroke-width="1.5"/>
    <!-- Page lines (left) -->
    <line x1="-18" y1="-10" x2="-4" y2="-10" stroke="#E8C85A" stroke-width="1" opacity="0.6"/>
    <line x1="-18" y1="-4" x2="-4" y2="-4" stroke="#E8C85A" stroke-width="1" opacity="0.6"/>
    <line x1="-18" y1="2" x2="-4" y2="2" stroke="#E8C85A" stroke-width="1" opacity="0.6"/>
    <!-- Page lines (right) -->
    <line x1="18" y1="-10" x2="4" y2="-10" stroke="#E8C85A" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="-4" x2="4" y2="-4" stroke="#E8C85A" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="2" x2="4" y2="2" stroke="#E8C85A" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- ========== WORDMARK ========== -->
  <!-- UCH main title -->
  <text x="158" y="52" font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="700" fill="#004D29" letter-spacing="3">
    UCH
  </text>

  <!-- Thin gold divider under UCH -->
  <line x1="158" y1="60" x2="462" y2="60" stroke="#C9A227" stroke-width="1.5"/>

  <!-- PROCUREMENT bold label -->
  <text x="158" y="88" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#C9A227" letter-spacing="5">
    PROCUREMENT
  </text>

  <!-- Subtitle -->
  <text x="159" y="108" font-family="'Segoe UI', Arial, sans-serif"
        font-size="10.5" fill="#004D29" letter-spacing="2" opacity="0.85">
    UNIVERSITY COLLEGE HOSPITAL · IBADAN
  </text>

  <!-- Federal badge ribbon at bottom -->
  <rect x="158" y="120" width="304" height="18" rx="3" fill="#004D29" opacity="0.08"/>
  <text x="310" y="133" font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" fill="#004D29" letter-spacing="1.5" text-anchor="middle" opacity="0.7">
    FEDERAL REPUBLIC OF NIGERIA · EST. 1957
  </text>
</svg>
