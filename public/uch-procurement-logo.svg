<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .circle-border { fill: white; stroke: black; stroke-width: 4; }
      .text-large { font-family: Arial, sans-serif; font-weight: bold; font-size: 56px; fill: black; text-anchor: middle; }
      .text-medium { font-family: Arial, sans-serif; font-weight: bold; font-size: 24px; fill: white; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background circle with border -->
  <circle cx="100" cy="100" r="96" class="circle-border"/>

  <!-- Top white half -->
  <rect x="10" y="10" width="180" height="90" fill="white"/>

  <!-- Bottom green half -->
  <rect x="10" y="100" width="180" height="90" fill="#00a34f"/>

  <!-- Dividing line -->
  <line x1="10" y1="100" x2="190" y2="100" stroke="black" stroke-width="2"/>

  <!-- UCH text -->
  <text x="100" y="65" class="text-large">UCH</text>

  <!-- IBADAN text -->
  <text x="100" y="155" class="text-medium">IBADAN</text>
</svg>
